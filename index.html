<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Stocki Bot</title>
    <style>
        /* التنسيق الأصلي الخاص بك مع تعديلات طفيفة للتحسين */
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{background:#0d1117;font-family:'Segoe UI',sans-serif;color:#e6edf3;min-height:100vh}
        .topbar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .login-wrap{padding:2rem 1rem;display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px)}
        .login-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2rem;width:100%;max-width:340px}
        .field-input, .mini-input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:11px 14px;color:#e6edf3;margin-bottom:1rem}
        .btn-primary, .btn-analyze{width:100%;background:#1f6feb;border:none;color:#fff;padding:12px;border-radius:8px;cursor:pointer;font-weight:600}
        .page{display:none; padding:1rem 16px 80px}
        .page.active{display:block}
        .analyze-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1rem}
        .report-toggle{display:flex;gap:6px;margin-bottom:15px}
        .toggle-btn{flex:1;background:#0d1117;border:1px solid #30363d;color:#8b949e;padding:8px;border-radius:6px;cursor:pointer;text-align:center;font-size:13px}
        .toggle-btn.active{background:#1f3a5f;border-color:#1f6feb;color:#58a6ff}
        .mini-label{font-size:12px;color:#8b949e;margin-bottom:5px;display:block}
        .bottom-nav{background:#161b22;border-top:1px solid #30363d;display:flex;position:fixed;bottom:0;left:0;right:0;padding:10px 0}
        .nav-item{flex:1;text-align:center;color:#8b949e;font-size:12px;cursor:pointer}
        .nav-item.active{color:#58a6ff}
    </style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
    <div class="login-card">
        <h2 style="text-align:center; margin-bottom:20px; color:#58a6ff">Stocki Bot</h2>
        <label class="mini-label">رمز الدخول</label>
        <input class="field-input" id="codeInput" type="password" placeholder="••••••••••">
        <div style="margin-bottom:15px">
            <input type="checkbox" id="rememberMe"> <label for="rememberMe" style="font-size:12px; color:#8b949e">تذكرني</label>
        </div>
        <button class="btn-primary" onclick="login()">دخول</button>
    </div>
</div>

<div id="mainApp" style="display:none">
    <div class="topbar">
        <div style="color:#58a6ff; font-weight:bold">Stocki Bot</div>
        <button onclick="logout()" style="background:none; border:none; color:#f85149; cursor:pointer">خروج</button>
    </div>

    <div class="page active" id="pageAnalyze">
        <h3 style="margin-bottom:20px">التحليل الذكي</h3>
        
        <div class="report-toggle">
            <div class="toggle-btn active" onclick="setMode('general', this)">تحليل عام</div>
            <div class="toggle-btn" onclick="setMode('position', this)">تحليل صفقة</div>
        </div>

        <div class="analyze-card">
            <label class="mini-label">رمز السهم</label>
            <input class="mini-input" id="analyzeSymbol" placeholder="مثلاً: NVDA" style="text-transform:uppercase">
            
            <div id="entryField" style="display:none">
                <label class="mini-label">سعر الدخول</label>
                <input class="mini-input" id="analyzeEntry" placeholder="0.00" type="number">
            </div>

            <div id="generalOptions">
                <label class="mini-label">نوع التقرير</label>
                <div class="report-toggle">
                    <div class="toggle-btn active" onclick="setReport('full', this)">مفصل</div>
                    <div class="toggle-btn" onclick="setReport('summary', this)">مختصر</div>
                </div>
            </div>

            <button class="btn-analyze" onclick="executeAnalysis()">ابدأ التحليل بالعربي</button>
        </div>

        <div id="resultBox" style="display:none; margin-top:20px; background:#161b22; border:1px solid #30363d; padding:15px; border-radius:10px">
            <div id="loader" style="text-align:center; color:#8b949e">⏳ جاري التحليل...</div>
            <div id="analysisContent" style="white-space:pre-wrap; font-size:14px; line-height:1.6"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">🔍 تحليل</div>
        <div class="nav-item">📊 الرئيسية</div>
        <div class="nav-item">⚙️ إعدادات</div>
    </div>
</div>

<script>
    let currentMode = 'general';
    let currentReport = 'full';

    // عند التحميل: تذكر الرمز
    window.onload = function() {
        const savedCode = localStorage.getItem('stocki_code');
        if (savedCode) {
            document.getElementById('codeInput').value = savedCode;
            document.getElementById('rememberMe').checked = true;
        }
    };

    function login() {
        const code = document.getElementById('codeInput').value;
        if (code === "ADM!n#2026$X") { // ضع رمزك هنا
            if (document.getElementById('rememberMe').checked) {
                localStorage.setItem('stocki_code', code);
            } else {
                localStorage.removeItem('stocki_code');
            }
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            alert("رمز خاطئ");
        }
    }

    function logout() {
        document.getElementById('loginWrap').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
    }

    function setMode(mode, el) {
        currentMode = mode;
        el.parentNode.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('entryField').style.display = (mode === 'position') ? 'block' : 'none';
        document.getElementById('generalOptions').style.display = (mode === 'general') ? 'block' : 'none';
    }

    function setReport(type, el) {
        currentReport = type;
        el.parentNode.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    async function executeAnalysis() {
        const symbol = document.getElementById('analyzeSymbol').value.toUpperCase();
        const entry = document.getElementById('analyzeEntry').value;
        
        if(!symbol) return alert("ادخل الرمز");

        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('analysisContent').textContent = '';

        try {
            const response = await fetch('https://YOUR-BACKEND-URL.com/analyze', { // استبدل برابط سيرفرك
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    symbol: symbol,
                    analysis_type: currentMode,
                    report_type: currentReport,
                    entry_price: entry
                })
            });
            const data = await response.json();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('analysisContent').textContent = data.analysis;
        } catch (e) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('analysisContent').textContent = "فشل الاتصال بالسيرفر";
        }
    }
</script>
</body>
</html>
